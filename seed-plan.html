window.seed = async function() {
  const btn = document.querySelector('button');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    const ref = await addDoc(collection(db, 'planes'), plan);
    msg.innerHTML = `<span style="color:#4ade80">Plan agregado. ID: ${ref.id}</span><br><br>Podés cerrar esta página.`;
    btn.textContent = 'Listo';
  } catch(e) {
    msg.innerHTML = `<span style="color:#f87171">Error: ${e.message}</span>`;
    btn.disabled = false;
    btn.textContent = 'Reintentar';
  }
};
